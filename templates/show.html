<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="description" content="StreamDrop — Secure media streaming.">
    <title>StreamDrop</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Plyr CSS -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
    <!-- React + Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Remix Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #050505;
            --surface: #0d0d0d;
            --surface-2: #141414;
            --border: #1e1e1e;
            --red: #e5252a;
            --red-glow: rgba(229, 37, 42, 0.3);
            --red-dim: rgba(229, 37, 42, 0.07);
            --text: #f0f0f0;
            --muted: #606060;
            --muted-2: #2a2a2a;
        }

        [data-theme="light"] {
            --bg: #f7f7f8;
            --surface: #ffffff;
            --surface-2: #f1f1f3;
            --border: #e2e2e7;
            --red: #dc1f24;
            --red-glow: rgba(220, 31, 36, 0.18);
            --red-dim: rgba(220, 31, 36, 0.05);
            --text: #111111;
            --muted: #888888;
            --muted-2: #d8d8dc;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body,
        #root {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.4s, color 0.37s;
            overflow-x: hidden;
        }

        /* Ambient blobs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.22;
        }

        .orb-1 {
            width: 55vw;
            height: 55vw;
            top: -20%;
            left: -15%;
            background: var(--red);
            animation: drift 14s ease-in-out infinite alternate;
        }

        .orb-2 {
            width: 35vw;
            height: 35vw;
            bottom: -15%;
            right: -10%;
            background: #1a0000;
            animation: drift 18s ease-in-out infinite alternate-reverse;
        }

        @keyframes drift {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(22px, 32px);
            }
        }

        /* Glass */
        .glass {
            background: rgba(13, 13, 13, 0.72);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
        }

        [data-theme="light"] .glass {
            background: rgba(255, 255, 255, 0.82);
        }

        /* Card reveal */
        @keyframes revealCard {
            from {
                opacity: 0;
                transform: translateY(28px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-anim {
            animation: revealCard 0.65s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Loader dots */
        .dot {
            display: inline-block;
            border-radius: 50%;
            background: var(--red);
            animation: dotBounce 1.4s infinite ease-in-out both;
        }

        .dot-1 {
            animation-delay: -0.32s;
        }

        .dot-2 {
            animation-delay: -0.16s;
        }

        @keyframes dotBounce {

            0%,
            80%,
            100% {
                transform: scale(0.1);
                opacity: 0.4;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Plyr */
        .plyr {
            border-radius: 16px;
            --plyr-color-main: var(--red);
            --plyr-video-background: #000;
            --plyr-menu-background: #111;
            --plyr-menu-color: #fff;
            font-family: 'Inter', sans-serif;
        }

        .plyr--video {
            border-radius: 16px;
            overflow: hidden;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0 20px;
            height: 48px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            white-space: nowrap;
            font-family: 'Inter', sans-serif;
        }

        .btn:active {
            transform: scale(0.92);
        }

        .btn-primary {
            background: var(--red);
            color: #fff;
            box-shadow: 0 4px 20px var(--red-glow);
        }

        .btn-primary:hover {
            filter: brightness(1.1);
            box-shadow: 0 6px 28px var(--red-glow);
        }

        .btn-outline {
            background: var(--surface-2);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-outline:hover {
            border-color: var(--red);
            color: var(--red);
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            padding: 0;
            background: var(--surface-2);
            color: var(--muted);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s, transform 0.15s;
            font-family: 'Inter', sans-serif;
        }

        .btn-icon:hover {
            border-color: var(--red);
            color: var(--red);
        }

        .btn-icon:active {
            transform: scale(0.88);
        }

        /* App Stream buttons */
        .stream-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            height: 42px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid var(--border);
            background: var(--surface-2);
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.15s;
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            color: var(--muted);
        }

        .stream-btn:active {
            transform: scale(0.91);
        }

        .stream-btn.vlc {
            color: #fb923c;
            border-color: rgba(251, 146, 60, 0.25);
        }

        .stream-btn.vlc:hover {
            background: rgba(251, 146, 60, 0.09);
            border-color: #fb923c;
        }

        .stream-btn.mx {
            color: #60a5fa;
            border-color: rgba(96, 165, 250, 0.25);
        }

        .stream-btn.mx:hover {
            background: rgba(96, 165, 250, 0.09);
            border-color: #60a5fa;
        }

        .stream-btn.playit {
            color: #34d399;
            border-color: rgba(52, 211, 153, 0.25);
        }

        .stream-btn.playit:hover {
            background: rgba(52, 211, 153, 0.09);
            border-color: #34d399;
        }

        .stream-btn.dim {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Badge */
        .badge-tag {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.07em;
            padding: 3px 9px;
            border-radius: 6px;
            border: 1px solid var(--border);
            color: var(--muted);
            background: var(--surface-2);
            text-transform: uppercase;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 99px;
        }
    </style>
</head>

<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div id="root"></div>

    <!-- Plyr (needed before React mounts) -->
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

    {% raw %}
    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        const BASE_URL = window.location.origin;
        const FILE_ID = window.location.pathname.split('/').pop();
        const urlParams = new URLSearchParams(window.location.search);
        const IS_ADMIN = urlParams.get('admin') === 'true';

        /* ─── Loader ──────────────────────────────────────────── */
        function Loader() {
            return (
                <div className="flex flex-col items-center justify-center py-24 gap-5">
                    <div style={{ display: 'inline-flex', gap: '6px' }}>
                        <span className="dot dot-1" style={{ width: 10, height: 10 }}></span>
                        <span className="dot dot-2" style={{ width: 10, height: 10 }}></span>
                        <span className="dot" style={{ width: 10, height: 10 }}></span>
                    </div>
                    <p style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.1em', color: 'var(--muted)', textTransform: 'uppercase' }}>
                        Fetching Stream
                    </p>
                </div>
            );
        }

        /* ─── Error ───────────────────────────────────────────── */
        function ErrorState() {
            return (
                <div className="flex flex-col items-center justify-center py-24 gap-5 text-center">
                    <div style={{ position: 'relative' }}>
                        <div style={{
                            position: 'absolute', inset: '-8px',
                            background: 'rgba(229,37,42,0.15)',
                            borderRadius: '50%', filter: 'blur(20px)'
                        }} />
                        <div className="relative w-20 h-20 rounded-2xl flex items-center justify-center"
                            style={{ background: 'var(--surface-2)', border: '1px solid rgba(229,37,42,0.25)' }}>
                            <i className="ri-lock-2-line text-[40px]" style={{ color: 'var(--red)' }}></i>
                        </div>
                    </div>
                    <div>
                        <h2 style={{ fontSize: 22, fontWeight: 700, marginBottom: 8 }}>Access Denied</h2>
                        <p style={{ fontSize: 13, color: 'var(--muted)', lineHeight: 1.6, maxWidth: 280, margin: '0 auto' }}>
                            This link has expired or is no longer valid. Request a new one from the bot.
                        </p>
                    </div>
                    <a href="https://t.me/STREAM_DROP_BOT" target="_blank" rel="noreferrer" className="btn btn-outline">
                        <i className="ri-send-plane-fill text-lg"></i> Open Telegram Bot
                    </a>
                </div>
            );
        }

        /* ─── Icon Button ─────────────────────────────────────── */
        function IconBtn({ icon, title, onClick, successIcon, successColor }) {
            const [active, setActive] = useState(false);
            const handle = useCallback(() => {
                onClick?.();
                if (successIcon) { setActive(true); setTimeout(() => setActive(false), 1800); }
            }, [onClick, successIcon]);

            return (
                <button className="btn-icon" title={title} onClick={handle}
                    style={active ? { borderColor: successColor || '#10b981', color: successColor || '#10b981' } : {}}>
                    <i className={`${active && successIcon ? successIcon : icon} text-base`}></i>
                </button>
            );
        }

        /* ─── Video Player ────────────────────────────────────── */
        function VideoPlayer({ src }) {
            const containerRef = useRef(null);
            const playerRef = useRef(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                if (!containerRef.current) return;
                const video = document.createElement('video');
                video.src = src;
                video.controls = true;
                video.playsInline = true;
                video.crossOrigin = 'anonymous';
                video.style.cssText = 'width:100%;height:100%;display:block;';
                containerRef.current.appendChild(video);

                const p = new Plyr(video, {
                    controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'captions', 'settings', 'pip', 'airplay', 'fullscreen'],
                    keyboard: { focused: true, global: false },
                    resetOnEnd: true,
                });
                playerRef.current = p;
                p.on('ready', () => setLoading(false));
                p.on('canplay', () => setLoading(false));
                p.on('playing', () => setLoading(false));

                return () => { try { p.destroy(); } catch { } };
            }, [src]);

            return (
                <div style={{ position: 'relative', width: '100%', background: '#000', borderRadius: 16, overflow: 'hidden' }}>
                    {loading && (
                        <div style={{
                            position: 'absolute', inset: 0, zIndex: 10,
                            display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
                            background: 'rgba(0,0,0,0.92)', gap: 12
                        }}>
                            <div style={{ display: 'inline-flex', gap: '6px' }}>
                                <span className="dot dot-1" style={{ width: 9, height: 9 }}></span>
                                <span className="dot dot-2" style={{ width: 9, height: 9 }}></span>
                                <span className="dot" style={{ width: 9, height: 9 }}></span>
                            </div>
                            <p style={{ fontSize: 10, fontWeight: 700, color: '#555', letterSpacing: '0.12em', textTransform: 'uppercase' }}>Loading</p>
                        </div>
                    )}
                    <div ref={containerRef}></div>
                </div>
            );
        }

        /* ─── Audio Player ────────────────────────────────────── */
        function AudioPlayer({ src, name }) {
            const audioRef = useRef(null);

            useEffect(() => {
                if (!audioRef.current) return;
                const p = new Plyr(audioRef.current, {
                    controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume'],
                    autoplay: false,
                });
                return () => { try { p.destroy(); } catch { } };
            }, [src]);

            return (
                <div className="rounded-2xl p-5" style={{ background: 'var(--surface-2)', border: '1px solid var(--border)' }}>
                    <div className="flex items-center gap-4 mb-5">
                        <div className="w-14 h-14 rounded-2xl flex items-center justify-center flex-shrink-0"
                            style={{ background: 'var(--red)', boxShadow: '0 6px 20px var(--red-glow)' }}>
                            <i className="ri-music-2-fill text-3xl text-white"></i>
                        </div>
                        <div className="min-w-0">
                            <p className="font-semibold text-sm truncate">{name}</p>
                            <p style={{ fontSize: 12, color: 'var(--muted)' }}>Audio Track</p>
                        </div>
                    </div>
                    <audio ref={audioRef} controls crossOrigin="anonymous" preload="metadata" style={{ display: 'none' }}>
                        <source src={src} />
                    </audio>
                </div>
            );
        }

        /* ─── App Stream Buttons ──────────────────────────────── */
        function StreamButtons({ data, isMobile }) {
            const copyVlc = useCallback(() => {
                navigator.clipboard.writeText(data.direct_dl_link).then(() => {
                    alert('Stream URL copied.\n\nTo play in VLC:\n1. Open VLC\n2. Media > Open Network Stream\n3. Paste the URL and play.');
                });
            }, [data.direct_dl_link]);

            if (isMobile) {
                return (
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10 }}>
                        <a href={data.vlc_player_link_mobile} className="stream-btn vlc">
                            <i className="ri-play-circle-fill text-xl"></i> VLC
                        </a>
                        <a href={data.mx_player_link} className="stream-btn mx">
                            <i className="ri-play-circle-fill text-xl"></i> MX
                        </a>
                        <a href={data.playit_link} className="stream-btn playit">
                            <i className="ri-play-circle-fill text-xl"></i> PlayIt
                        </a>
                    </div>
                );
            }

            return (
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10 }}>
                    <button onClick={copyVlc} className="stream-btn vlc">
                        <i className="ri-play-circle-fill text-xl"></i> VLC (PC)
                    </button>
                    <button onClick={() => alert('MX Player is a mobile-only app.')} className="stream-btn dim">
                        <i className="ri-information-line text-xl"></i> MX Player
                    </button>
                    <button onClick={() => alert('PlayIt is a mobile-only app.')} className="stream-btn dim">
                        <i className="ri-information-line text-xl"></i> PlayIt
                    </button>
                </div>
            );
        }

        /* ─── Embed Section ───────────────────────────────────── */
        function EmbedSection({ embedLink }) {
            const code = `<iframe src="${embedLink}" width="100%" height="560" frameborder="0" allowfullscreen></iframe>`;
            const [copied, setCopied] = useState(false);
            const handleCopy = () => {
                navigator.clipboard.writeText(code);
                setCopied(true);
                setTimeout(() => setCopied(false), 1800);
            };
            return (
                <div style={{ marginTop: 20, padding: 16, borderRadius: 16, background: 'var(--red-dim)', border: '1px solid rgba(229,37,42,0.18)' }}>
                    <p style={{ fontSize: 10, fontWeight: 700, color: 'var(--red)', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 10, display: 'flex', alignItems: 'center', gap: 6 }}>
                        <i className="ri-code-s-slash-line"></i> Embed Code — Admin
                    </p>
                    <div style={{ position: 'relative' }}>
                        <textarea readOnly value={code}
                            style={{ width: '100%', height: 60, background: '#000', border: '1px solid var(--border)', borderRadius: 10, padding: '10px 12px', fontSize: 11, color: '#f0f0f0', fontFamily: 'monospace', resize: 'none', outline: 'none' }} />
                        <button onClick={handleCopy}
                            style={{ position: 'absolute', top: 8, right: 8, padding: '4px 12px', borderRadius: 8, background: copied ? '#10b981' : 'var(--red)', color: '#fff', fontSize: 11, fontWeight: 700, border: 'none', cursor: 'pointer', transition: 'background 0.2s' }}>
                            {copied ? <i className="ri-check-line"></i> : <i className="ri-clipboard-line"></i>}
                            &nbsp;{copied ? 'Copied' : 'Copy'}
                        </button>
                    </div>
                </div>
            );
        }

        /* ─── Success Content ─────────────────────────────────── */
        function SuccessContent({ data }) {
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            const isAudio = data.is_media && data.file_name.match(/\.(mp3|aac|wav|flac|m4a|ogg)$/i);
            const isPDF = data.file_name.match(/\.pdf$/i);
            const isImage = data.file_name.match(/\.(jpg|jpeg|png|gif|webp|svg)$/i);
            const isVideo = data.is_media && !isAudio;

            let fileType = 'FILE';
            let fileIcon = 'ri-file-3-line';
            if (isAudio) { fileType = 'AUDIO'; fileIcon = 'ri-music-2-line'; }
            else if (isVideo) { fileType = 'VIDEO'; fileIcon = 'ri-film-line'; }
            else if (isPDF) { fileType = 'PDF'; fileIcon = 'ri-file-pdf-2-line'; }
            else if (isImage) { fileType = 'IMAGE'; fileIcon = 'ri-image-2-line'; }

            return (
                <div>
                    {/* Media Area */}
                    {isAudio && <div style={{ marginBottom: 20 }}><AudioPlayer src={data.direct_dl_link} name={data.file_name} /></div>}
                    {isVideo && <div style={{ marginBottom: 20 }}><VideoPlayer src={data.direct_dl_link} /></div>}
                    {isPDF && (
                        <div style={{ height: 520, background: 'var(--surface-2)', borderRadius: 16, overflow: 'hidden', marginBottom: 20, border: '1px solid var(--border)' }}>
                            <iframe src={data.direct_dl_link} style={{ width: '100%', height: '100%', border: 'none' }}></iframe>
                        </div>
                    )}
                    {isImage && (
                        <div style={{ background: 'var(--surface-2)', borderRadius: 16, padding: 16, marginBottom: 20, textAlign: 'center', border: '1px solid var(--border)' }}>
                            <img src={data.direct_dl_link} alt={data.file_name} style={{ maxWidth: '100%', maxHeight: 480, objectFit: 'contain', borderRadius: 12 }} />
                        </div>
                    )}

                    {/* File Info Row */}
                    <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12, marginBottom: 20 }}>
                        <div style={{ width: 44, height: 44, borderRadius: 12, background: 'var(--surface-2)', border: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                            <i className={`${fileIcon} text-2xl`} style={{ color: 'var(--red)' }}></i>
                        </div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                            <p style={{ fontWeight: 700, fontSize: 15, lineHeight: 1.35, wordBreak: 'break-all', marginBottom: 6 }}>{data.file_name}</p>
                            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                                <span className="badge-tag">{fileType}</span>
                                <span className="badge-tag" style={{ color: '#60d394', borderColor: 'rgba(96,211,148,0.2)' }}>{data.file_size}</span>
                                <span className="badge-tag" style={{ color: '#34d399', borderColor: 'rgba(52,211,153,0.2)' }}>READY</span>
                            </div>
                        </div>
                    </div>

                    {/* Action Buttons */}
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                        <a href={data.direct_dl_link} download className="btn btn-primary" style={{ width: '100%' }}>
                            <i className="ri-download-cloud-2-fill text-xl"></i>
                            Download {fileType === 'AUDIO' ? 'Audio' : fileType === 'VIDEO' ? 'Video' : fileType === 'PDF' ? 'PDF' : fileType === 'IMAGE' ? 'Image' : 'File'}
                        </a>

                        {isVideo && <StreamButtons data={data} isMobile={isMobile} />}
                    </div>

                    {/* Admin Embed */}
                    {IS_ADMIN && data.embed_link && <EmbedSection embedLink={data.embed_link} />}
                </div>
            );
        }

        /* ─── App ─────────────────────────────────────────────── */
        function App() {
            const [status, setStatus] = useState('loading'); // loading | error | success
            const [data, setData] = useState(null);
            const [theme, setTheme] = useState(() => localStorage.getItem('univora_theme') || 'dark');
            const [copied, setCopied] = useState(false);

            useEffect(() => {
                document.documentElement.setAttribute('data-theme', theme === 'light' ? 'light' : '');
                localStorage.setItem('univora_theme', theme);
            }, [theme]);

            useEffect(() => {
                fetch(`${BASE_URL}/api/file/${FILE_ID}`)
                    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
                    .then(d => { setData(d); document.title = `${d.file_name} — StreamDrop`; setStatus('success'); })
                    .catch(() => setStatus('error'));
            }, []);

            const toggleTheme = () => setTheme(t => t === 'dark' ? 'light' : 'dark');

            const copyLink = useCallback(() => {
                navigator.clipboard.writeText(window.location.href);
                setCopied(true);
                setTimeout(() => setCopied(false), 1800);
            }, []);

            const shareLink = useCallback(() => {
                if (navigator.share) navigator.share({ title: document.title, url: window.location.href });
                else copyLink();
            }, [copyLink]);

            return (
                <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '20px 16px', position: 'relative', zIndex: 1 }}>
                    <div className="glass card-anim" style={{ width: '100%', maxWidth: 620, borderRadius: 24, overflow: 'hidden', boxShadow: '0 32px 80px rgba(0,0,0,0.4)' }}>

                        {/* ─ Header ─ */}
                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '16px 20px', borderBottom: '1px solid var(--border)' }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                                <div style={{ width: 38, height: 38, borderRadius: 11, background: 'var(--red)', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 4px 14px var(--red-glow)', flexShrink: 0 }}>
                                    <i className="ri-play-fill text-white text-xl"></i>
                                </div>
                                <div>
                                    <p style={{ fontWeight: 700, fontSize: 15, letterSpacing: '-0.02em' }}>StreamDrop</p>
                                    <p style={{ fontSize: 10, fontWeight: 600, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.08em' }}>Secure Streaming</p>
                                </div>
                            </div>

                            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                {IS_ADMIN && data && data.dashboard_link && (
                                    <a href={data.dashboard_link} target="_blank" rel="noreferrer"
                                        className="btn-icon" title="Admin Dashboard" style={{ color: 'var(--red)', borderColor: 'rgba(229,37,42,0.3)' }}>
                                        <i className="ri-dashboard-2-line text-base"></i>
                                    </a>
                                )}
                                <button className="btn-icon" title="Copy Link" onClick={copyLink}
                                    style={copied ? { borderColor: '#10b981', color: '#10b981' } : {}}>
                                    <i className={`${copied ? 'ri-check-line' : 'ri-links-line'} text-base`}></i>
                                </button>
                                <button className="btn-icon" title="Share" onClick={shareLink}>
                                    <i className="ri-share-forward-line text-base"></i>
                                </button>
                                <button className="btn-icon" title="Toggle Theme" onClick={toggleTheme}>
                                    <i className={`${theme === 'dark' ? 'ri-moon-line' : 'ri-sun-line'} text-base`}></i>
                                </button>
                            </div>
                        </div>

                        {/* ─ Body ─ */}
                        <div style={{ padding: '24px 20px' }}>
                            {status === 'loading' && <Loader />}
                            {status === 'error' && <ErrorState />}
                            {status === 'success' && data && <SuccessContent data={data} />}
                        </div>

                        {/* ─ Footer ─ */}
                        <div style={{ borderTop: '1px solid var(--border)', height: 48, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'rgba(0,0,0,0.15)' }}>
                            <a href="https://univora.site" target="_blank" rel="noreferrer"
                                style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 11, fontWeight: 600, color: 'var(--muted)', textDecoration: 'none', letterSpacing: '0.04em' }}>
                                <i className="ri-global-line text-sm"></i>
                                this platform by&nbsp;<span style={{ color: 'var(--red)', fontWeight: 700 }}>UNIVORA</span>
                            </a>
                        </div>

                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    {% endraw %}
</body>

</html>
