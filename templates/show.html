<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="description" content="StreamDrop — Secure media streaming.">
    <title>StreamDrop Player</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Plyr CSS -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
    <!-- React + Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Remix Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Netflix+Sans:wght@300;400;500;700&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg: #141414;
            /* Netflix black */
            --bg-audio: #121212;
            /* Spotify black */
            --surface: #181818;
            --surface-hover: #282828;
            --border: #333333;
            --primary: #E50914;
            /* Netflix red */
            --primary-audio: #1DB954;
            /* Spotify green */
            --text-main: #FFFFFF;
            --text-muted: #B3B3B3;
            --font-main: 'Outfit', sans-serif;
            --radius-btn: 4px;
        }

        [data-layout="audio"] {
            --bg: var(--bg-audio);
            --primary: var(--primary-audio);
            --surface: #181818;
            --surface-hover: #2a2a2a;
            --border: #282828;
            --radius-btn: 50px;
        }

        body,
        #root {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text-main);
            font-family: var(--font-main);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            transition: background 0.3s;
        }

        /* Ambient effects */
        .ambient-glow {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50vh;
            background: linear-gradient(to bottom, rgba(229, 9, 20, 0.15), transparent);
            pointer-events: none;
            z-index: 0;
            transition: background 0.5s;
        }

        [data-layout="audio"] .ambient-glow {
            background: linear-gradient(to bottom, rgba(29, 185, 84, 0.15), transparent);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Plyr Overrides for Premium feel */
        .plyr {
            --plyr-color-main: var(--primary);
            --plyr-video-background: #000;
            --plyr-menu-background: rgba(24, 24, 24, 0.95);
            --plyr-menu-color: #fff;
            --plyr-font-family: var(--font-main);
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        [data-layout="audio"] .plyr {
            border-radius: 12px;
            box-shadow: none;
            --plyr-audio-controls-background: transparent;
            --plyr-audio-control-color: var(--text-muted);
            --plyr-audio-control-color-hover: #fff;
        }

        /* Buttons */
        .btn-brand {
            background: var(--primary);
            color: #fff;
            border-radius: var(--radius-btn);
            padding: 10px 24px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s, filter 0.2s;
            cursor: pointer;
            border: none;
        }

        .btn-brand:hover {
            filter: brightness(1.1);
            transform: scale(1.02);
        }

        .btn-brand:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: var(--radius-btn);
            padding: 10px 24px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s, transform 0.2s;
            cursor: pointer;
            border: none;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.02);
        }

        /* Sidebar item hover */
        .sidebar-item {
            transition: background 0.2s, color 0.2s;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-muted);
        }

        .sidebar-item:hover {
            background: var(--surface-hover);
            color: #fff;
        }

        .sidebar-item.active {
            color: var(--primary);
        }

        /* Layout Grid */
        .app-layout {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 24px;
            max-width: 1600px;
            margin: 0 auto;
            padding: 24px;
            position: relative;
            z-index: 10;
        }

        @media (max-width: 1024px) {
            .app-layout {
                grid-template-columns: 1fr;
            }
        }

        /* Loading Spinner */
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Audio Layout specifics */
        .audio-cover {
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .audio-cover:hover {
            transform: scale(1.03);
        }
    </style>
</head>

<body>
    <!-- Plyr -->
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

    <div id="root"></div>

    {% raw %}
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const BASE_URL = window.location.origin;
        const FILE_ID = window.location.pathname.split('/').pop();
        const urlParams = new URLSearchParams(window.location.search);
        const IS_ADMIN = urlParams.get('admin') === 'true';

        /* ─── Video Player Component ─── */
        function VideoPlayer({ src, title }) {
            const videoRef = useRef(null);

            useEffect(() => {
                if (!videoRef.current) return;
                const p = new Plyr(videoRef.current, {
                    controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'captions', 'settings', 'pip', 'airplay', 'fullscreen'],
                    settings: ['quality', 'speed'],
                    keyboard: { focused: true, global: true },
                    autoplay: true,
                });
                return () => p.destroy();
            }, [src]);

            return (
                <div style={{ borderRadius: 8, overflow: 'hidden', background: '#000' }}>
                    <video ref={videoRef} playsInline crossOrigin="anonymous">
                        <source src={src} />
                    </video>
                </div>
            );
        }

        /* ─── Audio Player Component ─── */
        function AudioPlayer({ src, title }) {
            const audioRef = useRef(null);

            useEffect(() => {
                if (!audioRef.current) return;
                const p = new Plyr(audioRef.current, {
                    controls: ['play', 'progress', 'current-time', 'duration', 'mute', 'volume'],
                    autoplay: true,
                });
                return () => p.destroy();
            }, [src]);

            return (
                <div className="flex flex-col items-center py-8">
                    <div className="audio-cover w-64 h-64 md:w-80 md:h-80 bg-gradient-to-br from-[#2a2a2a] to-[#121212] rounded-xl flex items-center justify-center mb-8 relative overflow-hidden group">
                        <i className="ri-music-2-line text-6xl text-[rgba(255,255,255,0.1)] group-hover:scale-110 transition-transform duration-500"></i>
                        <div className="absolute inset-0 bg-gradient-to-t from-[rgba(0,0,0,0.6)] to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    </div>

                    <div className="w-full max-w-2xl px-6">
                        <h2 className="text-2xl md:text-4xl font-bold text-center mb-2 tracking-tight text-white">{title}</h2>
                        <p className="text-[#b3b3b3] text-center mb-10 text-sm md:text-base">StreamDrop Audio Stream</p>

                        <div className="px-2">
                            <audio ref={audioRef} crossOrigin="anonymous">
                                <source src={src} />
                            </audio>
                        </div>
                    </div>
                </div>
            );
        }

        /* ─── Sidebar / Up Next Queue ─── */
        function SidebarQueue({ currentId, files }) {
            const [filter, setFilter] = useState('all');
            const [search, setSearch] = useState('');

            const filteredFiles = useMemo(() => {
                if (!files) return [];
                return files.filter(f => {
                    if (filter !== 'all' && f.type !== filter) return false;
                    if (search && !f.name.toLowerCase().includes(search.toLowerCase())) return false;
                    return true;
                });
            }, [files, filter, search]);

            if (!files || files.length === 0) return null;

            return (
                <div className="flex flex-col h-full bg-[var(--surface)] border border-[var(--border)] rounded-xl overflow-hidden p-4">
                    <h3 className="text-lg font-bold mb-4 text-white">Up Next</h3>

                    {/* Search & Filters */}
                    <div className="mb-4 space-y-3">
                        <div className="relative">
                            <i className="ri-search-line absolute left-3 top-1/2 -translate-y-1/2 text-[var(--text-muted)]"></i>
                            <input
                                type="text"
                                placeholder="Search files..."
                                className="w-full bg-[var(--bg)] text-sm text-white rounded-md pl-9 pr-3 py-2 border border-[var(--border)] focus:border-[var(--primary)] outline-none transition-colors"
                                value={search}
                                onChange={e => setSearch(e.target.value)}
                            />
                        </div>
                        <div className="flex gap-2 text-xs font-semibold">
                            {['all', 'video', 'audio'].map(t => (
                                <button key={t}
                                    onClick={() => setFilter(t)}
                                    className={`px-3 py-1.5 rounded-full capitalize transition-colors ${filter === t ? 'bg-[var(--primary)] text-white' : 'bg-[rgba(255,255,255,0.1)] text-[var(--text-muted)] hover:text-white'}`}>
                                    {t}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* File List */}
                    <div className="flex-1 overflow-y-auto pr-2 pb-4 space-y-1">
                        {filteredFiles.length > 0 ? filteredFiles.map(f => (
                            <a href={f.stream_link} key={f.id}
                                className={`sidebar-item flex items-start gap-3 p-2.5 ${f.id === currentId ? 'active bg-[rgba(255,255,255,0.05)]' : ''}`}>
                                <div className="w-10 h-10 rounded-md bg-[var(--bg)] flex items-center justify-center flex-shrink-0">
                                    <i className={`${f.type === 'video' ? 'ri-play-line' : f.type === 'audio' ? 'ri-music-2-line' : 'ri-file-3-line'} text-lg`}></i>
                                </div>
                                <div className="min-w-0 flex-1">
                                    <p className="font-semibold text-sm truncate leading-tight mb-1" title={f.name}>
                                        {f.name}
                                    </p>
                                    <p className="text-xs text-[var(--text-muted)] opacity-80">{f.size}</p>
                                </div>
                                {f.id === currentId && (
                                    <i className="ri-equalizer-line text-xs animate-pulse text-[var(--primary)] mt-1"></i>
                                )}
                            </a>
                        )) : (
                            <p className="text-sm text-[var(--text-muted)] text-center py-8">No files match your search.</p>
                        )}
                    </div>
                </div>
            );
        }

        /* ─── Main Application ─── */
        function App() {
            const [status, setStatus] = useState('loading');
            const [data, setData] = useState(null);
            const [expiredMsg, setExpiredMsg] = useState('');

            useEffect(() => {
                fetch(`${BASE_URL}/api/file/${FILE_ID}`)
                    .then(async r => {
                        if (r.status === 410) {
                            const body = await r.json();
                            setExpiredMsg(body.detail || 'This link has expired.');
                            setStatus('expired');
                            return null;
                        }
                        if (!r.ok) throw new Error();
                        return r.json();
                    })
                    .then(d => {
                        if (!d) return; // expired case handled above
                        setData(d);
                        document.title = `${d.file_name} — StreamDrop`;
                        const isAudio = d.is_media && d.file_name.match(/\.(mp3|aac|wav|flac|m4a|ogg)$/i);
                        document.documentElement.setAttribute('data-layout', isAudio ? 'audio' : 'video');
                        setStatus('success');
                    })
                    .catch(() => setStatus('error'));
            }, []);

            if (status === 'loading') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center">
                        <div className="spinner mb-4"></div>
                        <p className="text-[var(--text-muted)] tracking-widest text-sm uppercase font-bold">Connecting</p>
                    </div>
                );
            }

            if (status === 'expired') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center px-4 text-center">
                        <i className="ri-time-line text-7xl text-yellow-400 mb-4"></i>
                        <h1 className="text-3xl font-bold mb-2">Link Expired</h1>
                        <p className="text-[var(--text-muted)] mb-2 max-w-md">{expiredMsg}</p>
                        <p className="text-xs text-[var(--text-muted)] mb-8 max-w-sm">To get a new stream link, simply send the file again to the bot and a fresh link will be generated instantly.</p>
                        <a href="https://t.me/STREAM_DROP_BOT" target="_blank" className="btn-brand">
                            <i className="ri-telegram-fill text-xl"></i> Get New Link
                        </a>
                    </div>
                );
            }

            if (status === 'error') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center px-4 text-center">
                        <i className="ri-error-warning-line text-6xl text-[var(--primary)] mb-4"></i>
                        <h1 className="text-3xl font-bold mb-2">Content Unavailable</h1>
                        <p className="text-[var(--text-muted)] mb-8 max-w-md">The file you are looking for has been removed or is inaccessible.</p>
                        <a href="https://t.me/STREAM_DROP_BOT" target="_blank" className="btn-brand">
                            <i className="ri-telegram-fill text-xl"></i> Open Bot
                        </a>
                    </div>
                );
            }

            const isAudio = data.is_media && data.file_name.match(/\.(mp3|aac|wav|flac|m4a|ogg)$/i);
            const isPDF = data.file_name.match(/\.pdf$/i);
            // Photo_ prefix is added for photos sent directly in Telegram
            const isImage = data.file_name.match(/\.(jpg|jpeg|png|gif|webp|svg|bmp|tiff)$/i)
                || data.file_name.startsWith('Photo_');
            const isVideo = data.is_media && !isAudio && !isImage;
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

            return (
                <div>
                    <div className="ambient-glow"></div>

                    {/* Header */}
                    <header className="relative z-20 flex items-center justify-between px-6 py-4 bg-gradient-to-b from-[rgba(0,0,0,0.8)] to-transparent">
                        <div className="flex items-center gap-2">
                            <img src="/static/logo.jpg" alt="StreamDrop"
                                style={{ width: 36, height: 36, borderRadius: 9, objectFit: 'cover' }} />
                            <span className="font-bold text-lg tracking-tight">StreamDrop</span>
                        </div>
                        <div className="flex items-center gap-3">
                            {IS_ADMIN && data.dashboard_link && (
                                <a href={data.dashboard_link} target="_blank" className="btn-secondary rounded-full px-4 py-2 text-sm !bg-[rgba(255,255,255,0.05)] text-[var(--primary-audio)] !border !border-[var(--primary-audio)] hover:!bg-[rgba(29,185,84,0.1)]">
                                    <i className="ri-dashboard-fill"></i> Admin
                                </a>
                            )}
                            <a href="https://univora.site" target="_blank" className="text-xs font-semibold text-[var(--text-muted)] hover:text-white transition-colors">
                                Powered by <span className="text-white">UNIVORA</span>
                            </a>
                        </div>
                    </header>

                    {/* Main Layout Grid */}
                    <main className="app-layout">

                        {/* Media Section */}
                        <div className="flex flex-col min-w-0">

                            {/* Player / Viewer */}
                            <div className="w-full mb-6">
                                {isVideo && <VideoPlayer src={data.direct_dl_link} title={data.file_name} />}
                                {isAudio && <AudioPlayer src={data.direct_dl_link} title={data.file_name} />}

                                {isPDF && (
                                    <div className="w-full aspect-[3/4] md:aspect-video rounded-lg overflow-hidden border border-[var(--border)] bg-[var(--surface)]">
                                        <iframe src={data.direct_dl_link} className="w-full h-full border-none"></iframe>
                                    </div>
                                )}

                                {isImage && (
                                    <div className="w-full rounded-lg overflow-hidden border border-[var(--border)] bg-[var(--surface)] p-4 flex justify-center items-center" style={{ minHeight: '60vh' }}>
                                        <img src={data.direct_dl_link} alt={data.file_name} className="max-w-full max-h-[80vh] object-contain rounded-md shadow-2xl" />
                                    </div>
                                )}

                                {(!isVideo && !isAudio && !isPDF && !isImage) && (
                                    <div className="w-full py-24 rounded-lg border border-[var(--border)] bg-[var(--surface)] flex flex-col items-center justify-center">
                                        <i className="ri-file-zip-line text-6xl text-[var(--text-muted)] mb-4"></i>
                                        <h3 className="text-xl font-bold mb-2">File Ready to Download</h3>
                                        <p className="text-[var(--text-muted)]">This file format cannot be previewed online.</p>
                                    </div>
                                )}
                            </div>

                            {/* Meta & Actions */}
                            <div className="flex flex-col md:flex-row md:items-start justify-between gap-6 bg-[var(--surface)] p-6 rounded-xl border border-[var(--border)]">
                                <div className="flex-1 min-w-0">
                                    <h1 className="text-xl md:text-2xl font-bold mb-2 break-all">{data.file_name}</h1>
                                    <div className="flex items-center gap-3">
                                        <span className="text-sm font-semibold text-[var(--text-muted)] bg-[rgba(255,255,255,0.05)] px-2 py-1 rounded">{data.file_size}</span>
                                        <span className="text-sm font-semibold text-[var(--primary)] uppercase tracking-wider">Ready</span>
                                    </div>
                                </div>

                                <div className="flex flex-col gap-3 min-w-[200px]">
                                    <a href={data.direct_dl_link} download className="btn-brand justify-center w-full">
                                        <i className="ri-download-2-line text-lg"></i> Download Link
                                    </a>

                                    {isVideo && (
                                        <div className="flex items-center gap-2 mt-2">
                                            {isMobile ? (
                                                <>
                                                    <a href={data.vlc_player_link_mobile} className="btn-secondary flex-1 justify-center !text-orange-400 !bg-[rgba(251,146,60,0.1)] hover:!bg-[rgba(251,146,60,0.2)]" title="Play in VLC">
                                                        <i className="ri-play-circle-fill text-xl"></i> VLC
                                                    </a>
                                                    <a href={data.mx_player_link} className="btn-secondary flex-1 justify-center !text-blue-400 !bg-[rgba(96,165,250,0.1)] hover:!bg-[rgba(96,165,250,0.2)]" title="Play in MX Player">
                                                        <i className="ri-play-circle-fill text-xl"></i> MX
                                                    </a>
                                                </>
                                            ) : (
                                                <button onClick={() => {
                                                    navigator.clipboard.writeText(data.direct_dl_link);
                                                    alert('Stream URL copied! Open VLC on PC > Media > Open Network Stream and paste the URL.');
                                                }} className="btn-secondary flex-1 justify-center !bg-[rgba(255,255,255,0.08)]">
                                                    <i className="ri-links-line"></i> Copy VLC URL
                                                </button>
                                            )}
                                        </div>
                                    )}

                                    {IS_ADMIN && data.embed_link && (
                                        <button onClick={() => {
                                            const code = `<iframe src="${data.embed_link}" width="100%" height="560" frameborder="0" allowfullscreen></iframe>`;
                                            navigator.clipboard.writeText(code);
                                            alert("Embed code copied to clipboard!");
                                        }} className="btn-secondary w-full justify-center mt-2 group">
                                            <i className="ri-code-s-slash-line group-hover:text-[var(--primary)] transition-colors"></i> Copy Embed
                                        </button>
                                    )}
                                </div>
                            </div>

                        </div>

                        {/* Sidebar */}
                        <SidebarQueue currentId={FILE_ID} files={data.user_files} />

                    </main>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    {% endraw %}
</body>

</html>
